name: Build and Publish AnyConnect

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Download Xray
      run: |
        wget https://dl.nssurge.com/snell/snell-server-v4.1.1-linux-amd64.zip
        unzip -o snell-server-v4.1.1-linux-amd64.zip
        mv snell-server snell-server-amd64

        wget https://dl.nssurge.com/snell/snell-server-v4.1.1-linux-aarch64.zip
        unzip -o snell-server-v4.1.1-linux-aarch64.zip
        mv snell-server snell-server-arm64

        chmod +x snell-server-amd64 snell-server-arm64
        ls -al .

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USER }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: codming/anyconnect:latest
